<!--
1) Start the HTML document.
   a) Use `<!DOCTYPE html>` to define the page as an HTML5 document.
   b) Open the `<html>` tag.

2) Create the head section.
   a) Set the page title as "My Delivery Tracker".
   b) Add internal CSS using the `<style>` tag.

3) Style the webpage.
   a) Style the `body` with font, background, text alignment, and padding.
   b) Style the heading using `h1`.
   c) Style the buttons with colour, padding, border radius, and cursor.
   d) Style each `div` as an output box.

4) Create the page content.
   a) Add the main heading.
   b) Add a Save Order button that calls `saveOrder()`.
   c) Add a Start Delivery button that calls `startDelivery()`.
   d) Add output rows for JSON text, loaded item, loaded price, status, and result.

5) Add JavaScript using the `<script>` tag.
   a) Create an `order` object with item, price, and shop details.
   b) Store the order data as key-value pairs.

6) Create the `saveOrder()` function.
   a) Convert the order object into JSON text using `JSON.stringify()`.
   b) Convert the JSON text back into a JavaScript object using `JSON.parse()`.
   c) Display the JSON text, loaded item, and loaded price on the webpage.

7) Create the `delay()` function.
   a) Return a Promise.
   b) Use `setTimeout()` to wait for the given number of milliseconds.

8) Create the async `startDelivery()` function.
   a) Clear the previous result.
   b) Show the first delivery status as "Order received!".
   c) Use `setTimeout()` to show the kitchen preparation status after 1 second.
   d) Use `await delay()` to pause before showing the next steps.
   e) Show "Out for delivery!" after waiting.
   f) Show the final message when the order arrives.

9) Close the `<script>`, `<body>`, and `<html>` tags to complete the webpage.
-->

<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Delivery app</title>
   <style>
      body { 
         font-family: monospace;
         font-size: 80%;
         background: #ADD8E6;
         text-align: left;
         padding: 30px 70px 30px 5px; 

      }

      h1 { color: #004F4F }
         button {
            background: #C6C4D2;
            color: white;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin: 7px;
         }
         div {
            border: 1px solid #9ECAE1;
            width: 300px;
            margin: 7px auto;
            padding: 9px 12px;
            text-align: left;
            border-radius: 8px;
         }
      
      
   </style>
</head>
<body>
   <h1>Uver Food Delivery</h1>
   <button onclick="saveOrder()">Save Order</button>
   <button onclick="startDelivery()">Start Delivery</button>

   <div>JSON Text: <span id="json-text"></span></div>
   <div>Loaded Item:<span id="loaded-item"></span>
   </div>
   <div>Loaded Price:<span id="loaded-price"></span>
   </div>
   <div>Status:<span id="status"></span></div>
   <div>Status:<span id="result"></span></div>

   <script>

      let order = {
         item: "Pizza",
         price: 5,
         shop: "My Snack Shop"
      };

      function saveOrder() {
         let jsonText      = JSON.stringify(order);
         let loadedOrder   = JSON.parse(jsonText);

         document.getElementById("json-text").innerHTML     = jsonText;
         document.getElementById("loaded-item").innerHTML   = loadedOrder.item;
         document.getElementById("loaded-price").innerHTML  = "$" + loadedOrder.price;
      }

      function delay(ms) {
         return new Promise(function(resolve){
            setTimeout(resolve, ms);
         });
      }

      async function startDelivery() {
         document.getElementById("result").innerHTML = "";
         
           document.getElementById("status").innerHTML = "Order recieved!";
           setTimeout(function() {
           document.getElementById("status").innerHTML = "Kitchen is preparing...";
           }, 1000);

           await delay(3000);
           document.getElementById("status").innerHTML = "Out for delivery!";

           await delay(2000);
           document.getElementById("result").innerHTML = "Your order has arrived!";
      }
   </script>
</body>
</html>
